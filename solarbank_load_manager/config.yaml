name: "Solarbank Load Manager"
version: "0.1.0"
slug: "solarbank_load_manager"
description: "Leistungsabhaengige Steuerung mehrerer Anker Solix Solarbaenke"
url: "https://github.com/elvis394/solarbank-load-manager-addons"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: "mdi:solar-power-variant"
panel_title: "Solarbank Manager"
homeassistant_api: true
hassio_api: false
stage: experimental
options:
  log_level: info
  dry_run: true
  regulation_interval_seconds: 15
  global_output_limit_w: 800
schema:
  log_level: list(trace|debug|info|warning|error)
  dry_run: bool
  regulation_interval_seconds: int(5,300)
  global_output_limit_w: int(0,1600)
