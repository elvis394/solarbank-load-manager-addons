name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r solarbank_load_manager/rootfs/app/backend/requirements-dev.txt
      - run: pytest solarbank_load_manager/rootfs/app/backend/tests
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: |
          cd solarbank_load_manager/rootfs/app/frontend
          npm ci
          npm run build
